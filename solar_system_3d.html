<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Solar System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #ui {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #ccc;
    z-index: 10;
    pointer-events: none;
  }
  #ui h1 {
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 4px;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  #ui p {
    font-size: 11px;
    color: #666;
    letter-spacing: 2px;
  }

  #controls {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .ctrl-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    color: #ccc;
    padding: 8px 18px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, border-color 0.2s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); color: #fff; }
  .ctrl-btn.active { background: rgba(255,200,80,0.15); border-color: rgba(255,200,80,0.5); color: #ffc850; }

  #speed-wrap {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    z-index: 10;
  }
  #speed-wrap label { font-size: 10px; letter-spacing: 2px; color: #555; text-transform: uppercase; }
  #speed-wrap input[type=range] {
    -webkit-appearance: none;
    width: 120px;
    height: 2px;
    background: rgba(255,255,255,0.15);
    outline: none;
    cursor: pointer;
  }
  #speed-wrap input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: #ffc850;
    border-radius: 50%;
  }
  #speed-val { font-size: 11px; color: #888; letter-spacing: 1px; }

  #hover-tip {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(255,255,255,0.12);
    color: #bbb;
    padding: 10px 14px;
    font-size: 11px;
    letter-spacing: 1.5px;
    pointer-events: none;
    display: none;
  }
  #hover-tip span { color: #fff; }

  /* Info Panel */
  #info-panel {
    position: fixed;
    top: 0; right: 0;
    width: 300px;
    height: 100%;
    background: rgba(4,6,18,0.92);
    border-left: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    z-index: 20;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow-y: auto;
  }
  #info-panel.open { transform: translateX(0); }

  #panel-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  #panel-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
    box-shadow: 0 0 10px currentColor;
  }
  #panel-title-wrap { margin-left: 12px; flex: 1; }
  #panel-name {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 5px;
    color: #fff;
    text-transform: uppercase;
  }
  #panel-type {
    font-size: 10px;
    letter-spacing: 3px;
    color: #555;
    margin-top: 4px;
    text-transform: uppercase;
  }
  #panel-close {
    background: none;
    border: 1px solid rgba(255,255,255,0.12);
    color: #666;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: color 0.2s, border-color 0.2s;
    font-family: monospace;
  }
  #panel-close:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

  #panel-body { padding: 0 24px 24px; flex: 1; }

  #panel-tagline {
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
    line-height: 1.7;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    margin-bottom: 20px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 10px 12px;
  }
  .stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: #444;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .stat-value {
    font-size: 12px;
    color: #ccc;
    letter-spacing: 0.5px;
  }

  .section-title {
    font-size: 9px;
    letter-spacing: 3px;
    color: #444;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  #panel-funfact {
    background: rgba(255,200,80,0.04);
    border: 1px solid rgba(255,200,80,0.12);
    padding: 12px 14px;
    font-size: 11px;
    color: #998855;
    letter-spacing: 0.8px;
    line-height: 1.7;
    font-style: italic;
  }
</style>
</head>
<body>

<div id="ui">
  <h1>Solar System</h1>
  <p>Drag to orbit &nbsp;·&nbsp; Scroll to zoom</p>
</div>

<div id="hover-tip">Hover: <span id="ht-name"></span></div>

<div id="info-panel">
  <div id="panel-header">
    <div id="panel-dot"></div>
    <div id="panel-title-wrap">
      <div id="panel-name">Earth</div>
      <div id="panel-type">Terrestrial Planet</div>
    </div>
    <button id="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div id="panel-body">
    <div id="panel-tagline"></div>
    <div class="section-title">Physical Data</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Distance from Sun</div><div class="stat-value" id="pd-dist"></div></div>
      <div class="stat-card"><div class="stat-label">Diameter</div><div class="stat-value" id="pd-diam"></div></div>
      <div class="stat-card"><div class="stat-label">Mass</div><div class="stat-value" id="pd-mass"></div></div>
      <div class="stat-card"><div class="stat-label">Surface Gravity</div><div class="stat-value" id="pd-grav"></div></div>
      <div class="stat-card"><div class="stat-label">Moons</div><div class="stat-value" id="pd-moons"></div></div>
      <div class="stat-card"><div class="stat-label">Temperature</div><div class="stat-value" id="pd-temp"></div></div>
    </div>
    <div class="section-title">Orbital & Rotation</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Orbital Period</div><div class="stat-value" id="pd-orbital"></div></div>
      <div class="stat-card"><div class="stat-label">Day Length</div><div class="stat-value" id="pd-day"></div></div>
    </div>
    <div class="section-title" style="margin-top:4px">Atmosphere</div>
    <div class="stat-card" style="margin-bottom:20px"><div class="stat-value" id="pd-atm"></div></div>
    <div class="section-title">Did You Know?</div>
    <div id="panel-funfact"></div>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn active" id="btn-orbits" onclick="toggleOrbits()">Orbits</button>
  <button class="ctrl-btn active" id="btn-labels" onclick="toggleLabels()">Labels</button>
  <button class="ctrl-btn" id="btn-pause" onclick="togglePause()">Pause</button>
  <button class="ctrl-btn" onclick="resetCamera()">Reset View</button>
</div>

<div id="speed-wrap">
  <label>Speed</label>
  <input type="range" id="speed" min="0.1" max="10" step="0.1" value="1">
  <span id="speed-val">1.0×</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const planetData = [
  { name:'Mercury', radius:0.38, distance:8,   color:'#b5b5b5', emissive:'#3a3a3a', period:0.24,  tilt:0,    info:'Closest to Sun · No atmosphere · -180°C to 430°C',
    type:'Terrestrial', distanceKm:'57.9M km', diameter:'4,879 km', mass:'3.30×10²³ kg', gravity:'3.7 m/s²', moons:'0', orbitalPeriod:'88 days', dayLength:'59 Earth days', tempRange:'-180°C to 430°C', atmosphere:'None', funFact:'A year on Mercury is shorter than its day.' },
  { name:'Venus',   radius:0.95, distance:13,  color:'#e8cda0', emissive:'#6b4e1a', period:0.615, tilt:177,  info:'Hottest planet · Dense CO₂ atmosphere · 465°C',
    type:'Terrestrial', distanceKm:'108.2M km', diameter:'12,104 km', mass:'4.87×10²⁴ kg', gravity:'8.87 m/s²', moons:'0', orbitalPeriod:'225 days', dayLength:'243 Earth days', tempRange:'465°C (avg)', atmosphere:'CO₂, Nitrogen', funFact:'Venus rotates backwards compared to most planets.' },
  { name:'Earth',   radius:1.0,  distance:20,  color:'#4fa3e0', emissive:'#0a2a4a', period:1.0,   tilt:23.5, info:'Our home · 1 Moon · Life-supporting atmosphere',
    type:'Terrestrial', distanceKm:'149.6M km', diameter:'12,742 km', mass:'5.97×10²⁴ kg', gravity:'9.8 m/s²', moons:'1', orbitalPeriod:'365.25 days', dayLength:'24 hours', tempRange:'-89°C to 58°C', atmosphere:'Nitrogen, Oxygen', funFact:'Earth is the densest planet in the Solar System.' },
  { name:'Mars',    radius:0.53, distance:28,  color:'#c1440e', emissive:'#4a1200', period:1.88,  tilt:25.2, info:'The Red Planet · 2 Moons · Olympus Mons',
    type:'Terrestrial', distanceKm:'227.9M km', diameter:'6,779 km', mass:'6.42×10²³ kg', gravity:'3.72 m/s²', moons:'2', orbitalPeriod:'687 days', dayLength:'24.6 hours', tempRange:'-125°C to 20°C', atmosphere:'CO₂, Nitrogen, Argon', funFact:'Home to Olympus Mons, the tallest volcano in the Solar System.' },
  { name:'Jupiter', radius:3.5,  distance:44,  color:'#c88b3a', emissive:'#3a2000', period:11.86, tilt:3.1,  info:'Largest planet · Great Red Spot · 95 Moons',
    type:'Gas Giant', distanceKm:'778.5M km', diameter:'139,820 km', mass:'1.90×10²⁷ kg', gravity:'24.79 m/s²', moons:'95', orbitalPeriod:'11.86 years', dayLength:'9.9 hours', tempRange:'-108°C (cloud top)', atmosphere:'Hydrogen, Helium', funFact:'Jupiter\'s Great Red Spot is a storm older than 350 years.' },
  { name:'Saturn',  radius:3.0,  distance:60,  color:'#e4d191', emissive:'#4a3d00', period:29.46, tilt:26.7, info:'Ringed giant · Least dense planet · 146 Moons',
    type:'Gas Giant', distanceKm:'1.43B km', diameter:'116,460 km', mass:'5.68×10²⁶ kg', gravity:'10.44 m/s²', moons:'146', orbitalPeriod:'29.46 years', dayLength:'10.7 hours', tempRange:'-178°C (cloud top)', atmosphere:'Hydrogen, Helium', funFact:'Saturn is so light it could float on water.' },
  { name:'Uranus',  radius:2.0,  distance:74,  color:'#7de8e8', emissive:'#004444', period:84.01, tilt:97.8, info:'Ice giant · Rotates on its side · 27 Moons',
    type:'Ice Giant', distanceKm:'2.87B km', diameter:'50,724 km', mass:'8.68×10²⁵ kg', gravity:'8.87 m/s²', moons:'27', orbitalPeriod:'84 years', dayLength:'17.2 hours', tempRange:'-224°C (min)', atmosphere:'Hydrogen, Helium, Methane', funFact:'Uranus rotates on its side with a tilt of 97.8°.' },
  { name:'Neptune', radius:1.9,  distance:88,  color:'#3f54ba', emissive:'#0a1050', period:164.8, tilt:28.3, info:'Fastest winds in solar system · 14 Moons',
    type:'Ice Giant', distanceKm:'4.50B km', diameter:'49,244 km', mass:'1.02×10²⁶ kg', gravity:'11.15 m/s²', moons:'16', orbitalPeriod:'165 years', dayLength:'16.1 hours', tempRange:'-218°C (avg)', atmosphere:'Hydrogen, Helium, Methane', funFact:'Winds on Neptune can reach 2,100 km/h — the fastest in the Solar System.' },
];

let scene, camera, renderer, raycaster, mouse;
let planets = [], orbitLines = [], labelSprites = [], asteroidBelt;
let showOrbits = true, showLabels = true, paused = false;
let speedMultiplier = 1.0;
let clock;
let angle = 0;

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);
  camera.position.set(0, 60, 120);
  camera.lookAt(0,0,0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2(-999, -999);
  clock = new THREE.Clock();

  // Stars background
  const starGeo = new THREE.BufferGeometry();
  const starCount = 8000;
  const starPositions = new Float32Array(starCount * 3);
  for(let i = 0; i < starCount * 3; i++) {
    starPositions[i] = (Math.random() - 0.5) * 2000;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.4, transparent: true, opacity: 0.8 });
  scene.add(new THREE.Points(starGeo, starMat));

  // Sun
  const sunGeo = new THREE.SphereGeometry(5, 32, 32);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
  const sun = new THREE.Mesh(sunGeo, sunMat);
  scene.add(sun);

  // Sun glow
  const glowGeo = new THREE.SphereGeometry(5.8, 32, 32);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.15, side: THREE.FrontSide });
  scene.add(new THREE.Mesh(glowGeo, glowMat));

  // Sun light
  const sunLight = new THREE.PointLight(0xfff4e0, 3, 500);
  scene.add(sunLight);
  scene.add(new THREE.AmbientLight(0x111133, 0.8));

  // Planets
  planetData.forEach((pd, i) => {
    const geo = new THREE.SphereGeometry(pd.radius, 32, 32);
    const mat = new THREE.MeshPhongMaterial({
      color: pd.color,
      emissive: pd.emissive,
      shininess: 30,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.rotation.z = THREE.MathUtils.degToRad(pd.tilt);
    mesh.userData = { ...pd, index: i };

    // Pivot for orbit
    const pivot = new THREE.Object3D();
    pivot.add(mesh);
    mesh.position.x = pd.distance;
    scene.add(pivot);

    // Saturn rings
    if(pd.name === 'Saturn') {
      const ringGeo = new THREE.RingGeometry(pd.radius * 1.3, pd.radius * 2.2, 64);
      const ringMat = new THREE.MeshBasicMaterial({ color: 0xc8a95a, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2.5;
      mesh.add(ring);
    }

    // Uranus rings (thin)
    if(pd.name === 'Uranus') {
      const ringGeo = new THREE.RingGeometry(pd.radius * 1.5, pd.radius * 1.7, 64);
      const ringMat = new THREE.MeshBasicMaterial({ color: 0x5ecece, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      mesh.add(ring);
    }

    // Earth moon
    if(pd.name === 'Earth') {
      const moonGeo = new THREE.SphereGeometry(0.27, 16, 16);
      const moonMat = new THREE.MeshPhongMaterial({ color: 0x999999, emissive: '#111' });
      const moon = new THREE.Mesh(moonGeo, moonMat);
      moon.position.set(2.5, 0, 0);
      moon.userData.isMoon = true;
      mesh.add(moon);
    }

    // Orbit line
    const orbitPoints = [];
    for(let a = 0; a <= Math.PI * 2; a += 0.02) {
      orbitPoints.push(new THREE.Vector3(Math.cos(a) * pd.distance, 0, Math.sin(a) * pd.distance));
    }
    const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPoints);
    const orbitMat = new THREE.LineBasicMaterial({ color: 0x333355, transparent: true, opacity: 0.5 });
    const orbitLine = new THREE.Line(orbitGeo, orbitMat);
    scene.add(orbitLine);
    orbitLines.push(orbitLine);

    // Label sprite
    const canvas2d = document.createElement('canvas');
    canvas2d.width = 256; canvas2d.height = 64;
    const ctx = canvas2d.getContext('2d');
    ctx.font = '20px Courier New';
    ctx.fillStyle = 'rgba(200,200,200,0.9)';
    ctx.fillText(pd.name, 10, 40);
    const tex = new THREE.CanvasTexture(canvas2d);
    const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(8, 2, 1);
    sprite.userData.planet = mesh;
    scene.add(sprite);
    labelSprites.push(sprite);

    planets.push({ mesh, pivot, pd, angle: Math.random() * Math.PI * 2 });
  });

  // Asteroid belt
  const beltGroup = new THREE.Group();
  for(let i = 0; i < 800; i++) {
    const r = 33 + Math.random() * 5;
    const a = Math.random() * Math.PI * 2;
    const y = (Math.random() - 0.5) * 0.5;
    const ag = new THREE.SphereGeometry(0.05 + Math.random() * 0.1, 4, 4);
    const am = new THREE.MeshBasicMaterial({ color: 0x666655 });
    const ast = new THREE.Mesh(ag, am);
    ast.position.set(Math.cos(a)*r, y, Math.sin(a)*r);
    beltGroup.add(ast);
  }
  scene.add(beltGroup);
  asteroidBelt = beltGroup;

  // Orbit controls (manual)
  setupOrbitControls();

  // Events
  window.addEventListener('resize', onResize);
  renderer.domElement.addEventListener('mousemove', onMouseMove);
  renderer.domElement.addEventListener('click', onClick);
  document.getElementById('speed').addEventListener('input', e => {
    speedMultiplier = parseFloat(e.target.value);
    document.getElementById('speed-val').textContent = speedMultiplier.toFixed(1) + '×';
  });

  animate();
}

// --- Simple Orbit Controls ---
let isDragging = false, lastMouse = {x:0, y:0};
let spherical = { theta: 0.3, phi: Math.PI/4, radius: 140 };

function setupOrbitControls() {
  const el = renderer.domElement;
  el.addEventListener('mousedown', e => { isDragging = true; lastMouse = {x:e.clientX, y:e.clientY}; });
  window.addEventListener('mouseup', () => { isDragging = false; });
  window.addEventListener('mousemove', e => {
    if(!isDragging) return;
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.05, Math.min(Math.PI/2, spherical.phi - dy * 0.005));
    lastMouse = {x:e.clientX, y:e.clientY};
    updateCamera();
  });
  el.addEventListener('wheel', e => {
    spherical.radius = Math.max(20, Math.min(400, spherical.radius + e.deltaY * 0.15));
    updateCamera();
  });
  // Touch
  let lastTouch = null, lastPinch = null;
  el.addEventListener('touchstart', e => {
    if(e.touches.length === 1) lastTouch = {x:e.touches[0].clientX, y:e.touches[0].clientY};
    if(e.touches.length === 2) lastPinch = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  });
  el.addEventListener('touchmove', e => {
    e.preventDefault();
    if(e.touches.length === 1 && lastTouch) {
      const dx = e.touches[0].clientX - lastTouch.x;
      const dy = e.touches[0].clientY - lastTouch.y;
      spherical.theta -= dx * 0.005;
      spherical.phi = Math.max(0.05, Math.min(Math.PI/2, spherical.phi - dy * 0.005));
      lastTouch = {x:e.touches[0].clientX, y:e.touches[0].clientY};
      updateCamera();
    }
    if(e.touches.length === 2 && lastPinch !== null) {
      const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      spherical.radius = Math.max(20, Math.min(400, spherical.radius - (d - lastPinch) * 0.3));
      lastPinch = d;
      updateCamera();
    }
  }, {passive:false});
}

function updateCamera() {
  camera.position.set(
    spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta),
    spherical.radius * Math.cos(spherical.phi),
    spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta)
  );
  camera.lookAt(0, 0, 0);
}

function resetCamera() {
  spherical = { theta: 0.3, phi: Math.PI/4, radius: 140 };
  updateCamera();
}

// --- Animation ---
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if(!paused) {
    planets.forEach(p => {
      const speed = (2 * Math.PI) / (p.pd.period * 36); // scaled time
      p.angle += speed * dt * speedMultiplier;
      p.pivot.rotation.y = p.angle;
      // Self rotation
      p.mesh.rotation.y += 0.5 * dt * speedMultiplier;
    });
    asteroidBelt.rotation.y += 0.001 * speedMultiplier;
  }

  // Update label positions
  labelSprites.forEach((s, i) => {
    const p = planets[i];
    const worldPos = new THREE.Vector3();
    p.mesh.getWorldPosition(worldPos);
    s.position.set(worldPos.x, worldPos.y + p.pd.radius + 1.5, worldPos.z);
    s.visible = showLabels;
  });

  // Raycasting for hover
  raycaster.setFromCamera(mouse, camera);
  const meshes = planets.map(p => p.mesh);
  const hits = raycaster.intersectObjects(meshes);
  const hoverTip = document.getElementById('hover-tip');
  if(hits.length > 0 && !isDragging) {
    const hit = hits[0].object;
    document.getElementById('ht-name').textContent = hit.userData.name;
    hoverTip.style.display = 'block';
    renderer.domElement.style.cursor = 'pointer';
  } else {
    hoverTip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }

  renderer.render(scene, camera);
}

function onMouseMove(e) {
  if(isDragging) return;
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
}

function onClick(e) {
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(planets.map(p => p.mesh));
  if(hits.length > 0) {
    const p = hits[0].object;
    const wp = new THREE.Vector3();
    p.getWorldPosition(wp);
    const dist = p.userData.radius * 8 + 20;
    spherical.radius = dist;
    const angle = Math.atan2(wp.x, wp.z);
    spherical.theta = angle + 0.5;
    spherical.phi = Math.PI / 5;
    updateCamera();
    openPanel(p.userData);
  }
}

function openPanel(pd) {
  document.getElementById('panel-name').textContent = pd.name.toUpperCase();
  document.getElementById('panel-type').textContent = pd.type + ' Planet';
  document.getElementById('panel-tagline').textContent = pd.info;
  document.getElementById('panel-dot').style.backgroundColor = pd.color;
  document.getElementById('panel-dot').style.color = pd.color;
  document.getElementById('pd-dist').textContent = pd.distanceKm;
  document.getElementById('pd-diam').textContent = pd.diameter;
  document.getElementById('pd-mass').textContent = pd.mass;
  document.getElementById('pd-grav').textContent = pd.gravity;
  document.getElementById('pd-moons').textContent = pd.moons;
  document.getElementById('pd-temp').textContent = pd.tempRange;
  document.getElementById('pd-orbital').textContent = pd.orbitalPeriod;
  document.getElementById('pd-day').textContent = pd.dayLength;
  document.getElementById('pd-atm').textContent = pd.atmosphere;
  document.getElementById('panel-funfact').textContent = pd.funFact;
  document.getElementById('info-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('open');
}

function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

function toggleOrbits() {
  showOrbits = !showOrbits;
  orbitLines.forEach(l => l.visible = showOrbits);
  document.getElementById('btn-orbits').classList.toggle('active', showOrbits);
}

function toggleLabels() {
  showLabels = !showLabels;
  document.getElementById('btn-labels').classList.toggle('active', showLabels);
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btn-pause');
  btn.textContent = paused ? 'Resume' : 'Pause';
  btn.classList.toggle('active', paused);
}

init();
</script>
